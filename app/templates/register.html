<!DOCTYPE html>
<html>
<head>
    <title>Register - Student Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="mb-4 text-center">Create Account</h3>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input id="full_name" type="text" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select id="role" class="form-select">
                                <option value="student">Student</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>

                        <p id="message" class="mt-3 text-center"></p>

                        <div class="text-center mt-3">
                            <a href="/login-page">Already have an account? Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function registerUser() {
            const fullName = document.getElementById("full_name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const role = document.getElementById("role").value;

            const response = await fetch("/users/register", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    full_name: fullName,
                    email: email,
                    password: password,
                    role: role
                })
            });

            const data = await response.json();
            const message = document.getElementById("message");

            if (!response.ok) {
                message.className = "mt-3 text-center text-danger";
                message.innerText = data.detail || "Registration failed";
                return;
            }

            message.className = "mt-3 text-center text-success";
            message.innerText = "Account created successfully. Redirecting to login...";

            setTimeout(() => {
                window.location.href = "/login-page";
            }, 1500);
        }
    </script>
</body>
</html>
