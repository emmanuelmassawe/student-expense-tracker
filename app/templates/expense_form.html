<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Student Expense Tracker</span>
            <div>
                <a href="/student-dashboard-page" class="btn btn-light btn-sm">Dashboard</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-4">Add Expense</h3>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select id="category" class="form-select">
                        <option value="food">Food</option>
                        <option value="rent">Rent</option>
                        <option value="transport">Transport</option>
                        <option value="education">Education</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="savings">Savings</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Amount</label>
                    <input id="amount" type="number" class="form-control" placeholder="Enter amount in TSh">
                </div>

                <div class="mb-3">
                    <label class="form-label">Expense Date</label>
                    <input id="expense_date" type="date" class="form-control">
                </div>

                <button onclick="submitExpense()" class="btn btn-primary">Save Expense</button>

                <p id="message" class="mt-3"></p>
            </div>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "/login-page";
        }

        async function submitExpense() {
            const token = localStorage.getItem("access_token");

            if (!token) {
                window.location.href = "/login-page";
                return;
            }

            const category = document.getElementById("category").value;
            const amount = Number(document.getElementById("amount").value);
            const expenseDate = document.getElementById("expense_date").value;

            const response = await fetch("/expenses/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    category: category,
                    amount: amount,
                    expense_date: expenseDate
                })
            });

            const data = await response.json();
            const message = document.getElementById("message");

            if (!response.ok) {
                message.className = "mt-3 text-danger";
                message.innerText = data.detail || "Failed to save expense";
                return;
            }

            message.className = "mt-3 text-success";
            message.innerText = "Expense saved successfully";

            document.getElementById("amount").value = "";
            document.getElementById("expense_date").value = "";
        }
    </script>
</body>
</html>
