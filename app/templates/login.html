<!DOCTYPE html>
<html>
<head>
    <title>Student Expense Tracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="mb-4 text-center">Login</h3>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input id="email" type="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input id="password" type="password" class="form-control">
                        </div>

                        <button class="btn btn-primary w-100" onclick="login()">Login</button>
                        <p id="message" class="mt-3 text-center text-danger"></p>

                        <div class="text-center mt-3">
                        <a href="/register-page">Do not have an account? Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/users/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                document.getElementById("message").innerText = data.detail || "Login failed";
                return;
            }

            localStorage.setItem("access_token", data.access_token);
            localStorage.setItem("role", data.user.role);

            if (data.user.role === "admin") {
                window.location.href = "/admin-dashboard-page";
            } else {
                window.location.href = "/student-dashboard-page";
            }
        }
    </script>
</body>
</html>
