<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/static/css/style.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <span class="navbar-brand">Admin Dashboard</span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">
          Logout
        </button>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row align-items-end mb-4">
        <div class="col-md-4">
          <label class="form-label">Month</label>
          <input id="month" class="form-control" value="2026-06" />
        </div>
        <div class="col-md-8">
          <button class="btn btn-primary mt-3" onclick="loadDashboard()">
            Load Dashboard
          </button>
          <button class="btn btn-success mt-3" onclick="runAggregation()">
            Run Aggregation
          </button>
          <button class="btn btn-warning mt-3" onclick="runClustering()">
            Run Clustering
          </button>
        </div>
      </div>

      <div id="message" class="mb-3"></div>

      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h5>Monthly Summaries</h5>

          <table class="table table-striped">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Food</th>
                <th>Rent</th>
                <th>Transport</th>
                <th>Education</th>
                <th>Entertainment</th>
                <th>Savings</th>
                <th>Total Spent</th>
                <th>Remaining</th>
              </tr>
            </thead>
            <tbody id="summaries_table"></tbody>
          </table>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h5>Cluster Results</h5>

          <table class="table table-striped">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Cluster</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody id="clusters_table"></tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="row g-3 mt-4">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Total Spending Per Student</h5>
            <canvas id="adminSpendingChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5>Cluster Distribution</h5>
            <canvas id="adminClusterChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script>
      function logout() {
        localStorage.clear();
        window.location.href = "/login-page";
      }

      function formatMoney(value) {
        return Number(value).toLocaleString() + " TSh";
      }

      function getToken() {
        const token = localStorage.getItem("access_token");

        if (!token) {
          window.location.href = "/login-page";
          return null;
        }

        return token;
      }
      let adminSpendingChart = null;
      let adminClusterChart = null;

      function renderAdminSpendingChart(summaries) {
        const labels = summaries.map(
          (summary) => `Student ${summary.student_id}`,
        );
        const values = summaries.map((summary) => summary.total_spent);

        if (adminSpendingChart) {
          adminSpendingChart.destroy();
        }

        adminSpendingChart = new Chart(
          document.getElementById("adminSpendingChart"),
          {
            type: "bar",
            data: {
              labels: labels,
              datasets: [
                {
                  label: "Total Spent",
                  data: values,
                  backgroundColor: "#0d6efd",
                },
              ],
            },
            options: {
              responsive: true,
            },
          },
        );
      }

      function renderAdminClusterChart(clusters) {
        const clusterCounts = {};

        clusters.forEach((cluster) => {
          const label = cluster.cluster_description;
          clusterCounts[label] = (clusterCounts[label] || 0) + 1;
        });

        if (adminClusterChart) {
          adminClusterChart.destroy();
        }

        adminClusterChart = new Chart(
          document.getElementById("adminClusterChart"),
          {
            type: "doughnut",
            data: {
              labels: Object.keys(clusterCounts),
              datasets: [
                {
                  data: Object.values(clusterCounts),
                  backgroundColor: [
                    "#0d6efd",
                    "#198754",
                    "#ffc107",
                    "#dc3545",
                    "#6f42c1",
                    "#20c997",
                  ],
                },
              ],
            },
            options: {
              responsive: true,
            },
          },
        );
      }

      async function loadDashboard() {
        const token = getToken();
        if (!token) return;

        const month = document.getElementById("month").value;

        const summariesResponse = await fetch(
          `/dashboard/admin/summaries?month=${month}`,
          {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          },
        );

        const summaries = await summariesResponse.json();
        const summariesTable = document.getElementById("summaries_table");
        summariesTable.innerHTML = "";

        if (summariesResponse.ok) {
          summaries.forEach((summary) => {
            summariesTable.innerHTML += `
                        <tr>
                            <td>${summary.student_id}</td>
                            <td>${formatMoney(summary.food_expense)}</td>
                            <td>${formatMoney(summary.rent)}</td>
                            <td>${formatMoney(summary.transport)}</td>
                            <td>${formatMoney(summary.education)}</td>
                            <td>${formatMoney(summary.entertainment)}</td>
                            <td>${formatMoney(summary.savings)}</td>
                            <td>${formatMoney(summary.total_spent)}</td>
                            <td>${formatMoney(summary.remaining_balance)}</td>
                        </tr>
                    `;
          });
        }
        renderAdminSpendingChart(summaries);

        const clustersResponse = await fetch(
          `/dashboard/admin/clusters?month=${month}`,
          {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          },
        );

        const clusters = await clustersResponse.json();
        const clustersTable = document.getElementById("clusters_table");
        clustersTable.innerHTML = "";

        if (clustersResponse.ok) {
          clusters.forEach((cluster) => {
            clustersTable.innerHTML += `
                        <tr>
                            <td>${cluster.student_id}</td>
                            <td>${cluster.cluster_label}</td>
                            <td>${cluster.cluster_description}</td>
                        </tr>
                    `;
          });
        }
      }
      renderAdminClusterChart(clusters);

      async function runAggregation() {
        const token = getToken();
        if (!token) return;

        const monthValue = document.getElementById("month").value;
        const [year, month] = monthValue.split("-");
        const response = await fetch(
          `/batch/aggregate/monthly?year=${year}&month=${Number(month)}`,
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          },
        );

        const data = await response.json();
        document.getElementById("message").className = response.ok
          ? "alert alert-success"
          : "alert alert-danger";
        document.getElementById("message").innerText =
          data.message || data.detail;
      }

      async function runClustering() {
        const token = getToken();
        if (!token) return;

        const month = document.getElementById("month").value;
        const response = await fetch(
          `/batch/cluster/monthly?month=${month}&number_of_clusters=3`,
          {
            method: "POST",
            headers: {
              Authorization: `Bearer ${token}`,
            },
          },
        );

        const data = await response.json();
        document.getElementById("message").className = response.ok
          ? "alert alert-success"
          : "alert alert-danger";
        document.getElementById("message").innerText =
          data.message || data.detail;
      }
    </script>
  </body>
</html>
